<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Rail Refuge: High Tide Rising - Save endangered Ridgway's Rails from rising tides and predators by planting protective vegetation">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="screen-orientation" content="landscape">
  <title>Rail Refuge: High Tide Rising</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <!-- Lucide icons (SVG icon library) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "phaser": "/node_modules/phaser/dist/phaser.esm.js"
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-water-deep: #0a3d62;
      --color-water-light: #1e6f9f;
      --color-marsh: #2d5016;
      --color-mud: #5d4e37;
      --color-upland: #4a7c23;
      --color-accent: #f39c12;
      --color-danger: #c0392b;
      --color-safe: #27ae60;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, var(--color-water-deep) 0%, #0d1f2d 50%, #1a2a1a 100%);
      font-family: 'Outfit', sans-serif;
      /* Prevent pull-to-refresh & overscroll on mobile */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      /* Prevent text selection on game canvas */
      -webkit-user-select: none;
      user-select: none;
      /* Prevent callout on long-press (iOS) */
      -webkit-touch-callout: none;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      /* Safe area insets for notched devices */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #game-container canvas {
      max-width: 100%;
      max-height: 100%;
      /* Prevent canvas context menu on long-press */
      -webkit-touch-callout: none;
      touch-action: none;
    }

    /* ─── Portrait / Landscape orientation gate ─── */
    #orientation-gate {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #0a3d62 0%, #0d1f2d 50%, #1a2a1a 100%);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      color: #ffffff;
      font-family: 'Outfit', sans-serif;
      text-align: center;
      padding: 2rem;
    }

    #orientation-gate .rotate-icon {
      width: 64px;
      height: 64px;
      color: #f39c12;
      animation: rotate-nudge 2s ease-in-out infinite;
    }

    #orientation-gate h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f39c12;
      margin: 0;
    }

    #orientation-gate p {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      max-width: 280px;
      margin: 0;
      line-height: 1.5;
    }

    @keyframes rotate-nudge {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }

    /* Show gate only on small portrait screens (phones) */
    @media (max-width: 768px) and (orientation: portrait) {
      #orientation-gate {
        display: flex;
      }
      #game-container {
        display: none;
      }
    }

    /* Tablet-specific tweaks */
    @media (min-width: 768px) and (max-width: 1024px) {
      #game-container canvas {
        max-width: 100vw;
        max-height: 100vh;
      }
    }

    /* Loading screen */
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a3d62 0%, #0d1f2d 50%, #1a2a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 3rem;
      font-weight: 900;
      color: #f39c12;
      text-shadow: 0 4px 20px rgba(243, 156, 18, 0.5);
      margin-bottom: 2rem;
      letter-spacing: 2px;
    }

    .loading-bar-container {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #27ae60, #2ecc71);
      border-radius: 4px;
      transition: width 0.3s ease;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
    }

    .loading-tip {
      margin-top: 2rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      font-weight: 400;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <!-- Orientation gate for portrait phones -->
  <div id="orientation-gate">
    <svg class="rotate-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="2" width="16" height="20" rx="2" ry="2"/>
      <line x1="12" y1="18" x2="12" y2="18.01"/>
    </svg>
    <h2>Rotate Your Device</h2>
    <p>Rail Refuge plays best in landscape mode. Please rotate your phone to continue.</p>
  </div>

  <div id="game-container">
    <div id="loading-screen">
      <h1 class="loading-title">RAIL REFUGE</h1>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <p class="loading-tip">Ridgway's Rails are endangered birds that depend on marshes for survival...</p>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
