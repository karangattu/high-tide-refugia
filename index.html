<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description"
    content="Rail Refuge: High Tide Rising - Save endangered Ridgway's Rails from rising tides and predators by planting protective vegetation">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Rail Refuge: High Tide Rising</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
  <!-- Lucide icons (SVG icon library) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "phaser": "/node_modules/phaser/dist/phaser.esm.js"
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-water-deep: #0a3d62;
      --color-water-light: #1e6f9f;
      --color-marsh: #2d5016;
      --color-mud: #5d4e37;
      --color-upland: #4a7c23;
      --color-accent: #f39c12;
      --color-danger: #c0392b;
      --color-safe: #27ae60;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, var(--color-water-deep) 0%, #0d1f2d 50%, #1a2a1a 100%);
      font-family: 'Outfit', sans-serif;
      /* Prevent pull-to-refresh & overscroll on mobile */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      /* Prevent text selection on game canvas */
      -webkit-user-select: none;
      user-select: none;
      /* Prevent callout on long-press (iOS) */
      -webkit-touch-callout: none;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      /* Safe area insets for notched devices */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #game-container canvas {
      max-width: 100%;
      max-height: 100%;
      /* Prevent canvas context menu on long-press */
      -webkit-touch-callout: none;
      touch-action: none;
    }

    #rotate-device-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(243, 156, 18, 0.22), transparent 35%),
        linear-gradient(180deg, rgba(10, 61, 98, 0.92), rgba(13, 31, 45, 0.98));
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 250;
      text-align: center;
    }

    .rotate-card {
      width: min(100%, 320px);
      padding: 28px 24px;
      border: 1px solid rgba(243, 156, 18, 0.35);
      border-radius: 24px;
      background: rgba(9, 25, 36, 0.84);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(14px);
    }

    .rotate-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      margin-bottom: 16px;
      border-radius: 50%;
      background: rgba(243, 156, 18, 0.18);
      color: #f39c12;
      font-size: 2rem;
      font-weight: 900;
    }

    .rotate-card h2 {
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .rotate-card p {
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    body.landscape-required #rotate-device-overlay {
      opacity: 1;
      pointer-events: auto;
    }

    body.landscape-required #game-container canvas,
    body.landscape-required #loading-screen {
      visibility: hidden;
    }



    /* Tablet-specific tweaks */
    @media (min-width: 768px) and (max-width: 1024px) {
      #game-container canvas {
        max-width: 100vw;
        max-height: 100vh;
      }
    }

    /* Loading screen */
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a3d62 0%, #0d1f2d 50%, #1a2a1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease-out;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 3rem;
      font-weight: 900;
      color: #f39c12;
      text-shadow: 0 4px 20px rgba(243, 156, 18, 0.5);
      margin-bottom: 2rem;
      letter-spacing: 2px;
    }

    .loading-bar-container {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #27ae60, #2ecc71);
      border-radius: 4px;
      transition: width 0.3s ease;
      box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
    }

    .loading-tip {
      margin-top: 2rem;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      font-weight: 400;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }
  </style>
</head>

<body>


  <div id="game-container">
    <div id="loading-screen">
      <h1 class="loading-title">RAIL REFUGE</h1>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
      <p class="loading-tip">Ridgway's Rails are endangered birds that depend on marshes for survival...</p>
    </div>
    <div id="rotate-device-overlay" aria-live="polite">
      <div class="rotate-card">
        <div class="rotate-icon">↻</div>
        <h2>Rotate Your Device</h2>
        <p>Rail Refuge is locked to landscape on phones so the marsh crossing has full play space.</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
